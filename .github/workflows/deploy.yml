name: Deploy Uplink Node

on:
  push:
    branches: ["main"]

# Forces the entire runner to use Node 24 for every step
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2 # Check for the most recent patch

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Upgraded to v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
