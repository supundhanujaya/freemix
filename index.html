<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: transparent; display: flex; justify-content: center; align-items: flex-start; font-family: 'Inter', -apple-system, sans-serif; }
        
        #surgical-upload-node { 
            background: #ffffff; border: 1px solid #3351d6; padding: 40px; 
            width: 95%; max-width: 420px; margin: 20px auto; 
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            box-sizing: border-box; transition: transform 0.3s ease;
        }

        /* SHAKE ANIMATION FOR ERRORS */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

        .node-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .signal-indicator { width: 6px; height: 6px; background: #9c27b0; border-radius: 50%; box-shadow: 0 0 10px #9c27b0; animation: pulse 1.5s infinite; }
        .status-text { font-size: 10px; letter-spacing: 3px; color: #111; font-weight: 800; }
        
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .field-wrap { position: relative; text-align: left; }

        input, textarea { 
            width: 100%; padding: 12px; border: 1px solid #eee; font-size: 11px; letter-spacing: 1px; 
            outline: none; transition: 0.3s; box-sizing: border-box; text-transform: uppercase;
        }
        textarea { resize: none; text-transform: none; border-left: 3px solid #eee; }

        /* SURGICAL VISUAL FEEDBACK */
        .is-invalid { border: 1px solid #ff0000 !important; background: #fff8f8; }
        .is-valid { border: 1px solid #3351d6 !important; }

        .error-label { display: none; font-size: 8px; color: #ff0000; font-weight: 800; letter-spacing: 1px; margin-top: 4px; }
        .is-invalid + .error-label { display: block; }

        .action-btn { 
            background: #ccc; color: #fff; border: none; padding: 18px; font-size: 11px; font-weight: 700; 
            letter-spacing: 2px; cursor: not-allowed; width: 100%; transition: 0.4s; opacity: 0.5;
        }
        .action-btn.active { background: #111; opacity: 1; cursor: pointer; }
        .action-btn.active:hover { background: #3351d6; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(51, 81, 214, 0.2); }

        /* PROCESSING & SUCCESS STATES */
        .action-btn.processing { background: #444 !important; color: #888 !important; cursor: wait; opacity: 1; }
        .action-btn.success { background: #00ff88 !important; color: #111 !important; border-color: #00ff88 !important; opacity: 1; }

        .instruction-text { font-size: 8px; letter-spacing: 1px; color: #aaa; margin-bottom: 15px; font-weight: 600; }
        #ui-success { display: none; padding: 20px 0; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="surgical-upload-node">
    <div id="ui-container">
        <div class="node-header">
            <span class="signal-indicator"></span>
            <span class="status-text">PROJECT UPLINK NODE</span>
        </div>

        <form id="ui-form" autocomplete="off">
            <div class="input-group">
                <input type="text" id="client-name" placeholder="ARTIST NAME" required>
                <div class="field-wrap">
                    <input type="text" id="client-email" placeholder="EMAIL ADDRESS" required>
                    <span class="error-label">STRICT FORMAT: NAME@DOMAIN.COM</span>
                </div>
                <input type="text" id="song-title" placeholder="SONG TITLE" required>
                <div class="field-wrap">
                    <input type="text" id="stems-link" placeholder="PASTE STEMS LINK (HTTPS://...)" required>
                    <span class="error-label">MUST START WITH HTTPS:// AND CONTAIN .DOMAIN</span>
                </div>
                <textarea id="mix-notes" placeholder="MIX NOTES / REFERENCES / INSTRUCTIONS" rows="4"></textarea>
            </div>
            <p class="instruction-text">UPLINK TEXT DATA TO STUDIO SERVER</p>
            <button type="button" id="submit-btn" class="action-btn" disabled>INITIALIZE PROJECT</button>
        </form>
    </div>

    <div id="ui-success">
        <p style="color: #3351d6; font-weight: 800; letter-spacing: 2px;">SIGNAL RECEIVED</p>
        <p style="font-size: 11px; color: #666; margin-top: 10px;">Check your inbox. Supun has been notified.</p>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeFviQGb1xxacQ9rfyeGkJ7pmVKCip-gmvxVhE6O-h4H_q_4FUqeckdmDMwVxYT_1A/exec';
    
    const node = document.getElementById('surgical-upload-node');
    const email = document.getElementById('client-email');
    const link = document.getElementById('stems-link');
    const btn = document.getElementById('submit-btn');
    const inputs = document.querySelectorAll('input[required]');

    const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,6}$/;
    const linkRegex = /^https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}\b([-a-zA-Z0-9()@:%_\+.~#?&//=]*)$/;

    function runValidation() {
        const emailVal = email.value.trim();
        const linkVal = link.value.trim();

        const isEmailValid = emailRegex.test(emailVal);
        const isLinkValid = linkRegex.test(linkVal);
        let allFilled = true;
        inputs.forEach(i => { if(!i.value.trim()) allFilled = false; });

        email.classList.toggle('is-invalid', emailVal !== "" && !isEmailValid);
        email.classList.toggle('is-valid', isEmailValid);
        
        link.classList.toggle('is-invalid', linkVal !== "" && !isLinkValid);
        link.classList.toggle('is-valid', isLinkValid);

        if (isEmailValid && isLinkValid && allFilled) {
            btn.classList.add('active');
            btn.disabled = false;
        } else {
            btn.classList.remove('active');
            btn.disabled = true;
        }
    }

    document.getElementById('ui-form').addEventListener('input', runValidation);

    btn.addEventListener('click', () => {
        if(btn.disabled) {
            node.classList.add('shake');
            setTimeout(() => node.classList.remove('shake'), 400);
            return;
        }

        // --- START STATUS UPDATE LOGIC ---
        btn.innerText = "UPLINKING SIGNAL...";
        btn.classList.add('processing');
        btn.disabled = true;

        const data = {
            name: document.getElementById('client-name').value.trim(),
            songTitle: document.getElementById('song-title').value.trim(),
            clientEmail: email.value.trim(),
            stemsLink: link.value.trim(),
            clientNotes: document.getElementById('mix-notes').value
        };

        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            // Update button to success state before switching screens
            btn.innerText = "SIGNAL RECEIVED";
            btn.classList.remove('processing');
            btn.classList.add('success');

            setTimeout(() => {
                document.getElementById('ui-container').style.display = 'none';
                document.getElementById('ui-success').style.display = 'block';
            }, 1200); // 1.2s delay for a premium feel
        })
        .catch(() => {
            alert("SIGNAL LOST. CHECK CONNECTION.");
            btn.innerText = "INITIALIZE PROJECT";
            btn.classList.remove('processing');
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
